services:
  agent-app:
    build:
      context: ./agent-app
    env_file:
      - ./agent-app/.env
    ports:
      - "8080:8080"

  web-ui:
    build:
      context: ./web-ui
      args:
        VITE_AGENT_API_BASE_URL: http://localhost:8080
    ports:
      - "5173:80"
    depends_on:
      - agent-app
